name: "Run Claude with OAuth failover"
description: >-
  Single source of truth for invoking anthropics/claude-code-action across this
  template's workflows: it pins the action once and runs it with the primary
  Claude Code OAuth token, transparently retrying with the configured fallback
  token(s) when an attempt fails (a subscription-quota exhaustion or a transient
  outage). Up to three credentials form the ladder: primary ->
  CLAUDE_CODE_OAUTH_TOKEN_FALLBACK -> CLAUDE_CODE_OAUTH_TOKEN_FALLBACK_2. Callers
  pass their own prompt / claude_args / tool gating (the model rides in claude_args
  as `--model`); the credential and retry logic live only here so no workflow
  re-implements them.
inputs:
  oauth_token:
    description: "Primary Claude Code OAuth token (secrets.CLAUDE_CODE_OAUTH_TOKEN)."
    required: true
  fallback_oauth_token:
    description: >-
      First backup Claude Code OAuth token
      (secrets.CLAUDE_CODE_OAUTH_TOKEN_FALLBACK). When set, a failed primary
      attempt is retried with this token; leave empty to disable the retry.
    required: false
    default: ""
  fallback_oauth_token_2:
    description: >-
      Second backup Claude Code OAuth token
      (secrets.CLAUDE_CODE_OAUTH_TOKEN_FALLBACK_2). When set, it is tried after the
      primary and first fallback have both failed (or aren't configured); leave
      empty to disable the third rung.
    required: false
    default: ""
  github_token:
    description: >-
      Token handed to the action directly so it skips the OIDC->GitHub-App
      exchange. Empty lets the action resolve its own default.
    required: false
    default: ""
  prompt:
    description: "Prompt for the agent. Empty runs the action in its event-driven (tag) mode."
    required: false
    default: ""
  claude_args:
    description: "CLI args forwarded to claude-code-action (--model, --allowedTools, ...)."
    required: false
    default: ""
  allowed_non_write_users:
    description: "Passthrough for claude-code-action allowed_non_write_users."
    required: false
    default: ""
  allowed_bots:
    description: "Passthrough for claude-code-action allowed_bots."
    required: false
    default: ""
outputs:
  execution_file:
    description: >-
      Execution-log path of the last attempt that ran (the highest fallback rung
      that fired, else the primary's). Callers read it to detect an is_error run.
    value: ${{ steps.fallback2.outputs.execution_file || steps.fallback.outputs.execution_file || steps.primary.outputs.execution_file }}
runs:
  using: "composite"
  steps:
    # Primary attempt. continue-on-error so a credential/quota failure doesn't
    # abort the composite before a fallback can run; the propagate step below
    # turns a genuine all-rungs-failed into a hard error.
    - name: Claude (primary credential)
      id: primary
      continue-on-error: true
      # This wrapper pins no model; every caller supplies --model in claude_args.
      uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157 allow-default-model
      with:
        claude_code_oauth_token: ${{ inputs.oauth_token }}
        github_token: ${{ inputs.github_token }}
        prompt: ${{ inputs.prompt }}
        claude_args: ${{ inputs.claude_args }}
        allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
        allowed_bots: ${{ inputs.allowed_bots }}
    # First fallback: only when the primary actually failed AND a backup token is
    # configured. Uses outcome (not conclusion — continue-on-error rewrites
    # conclusion to success), so it fires exactly on a real primary failure.
    - name: Claude (fallback credential)
      id: fallback
      if: steps.primary.outcome == 'failure' && inputs.fallback_oauth_token != ''
      continue-on-error: true
      # This wrapper pins no model; every caller supplies --model in claude_args.
      uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157 allow-default-model
      with:
        claude_code_oauth_token: ${{ inputs.fallback_oauth_token }}
        github_token: ${{ inputs.github_token }}
        prompt: ${{ inputs.prompt }}
        claude_args: ${{ inputs.claude_args }}
        allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
        allowed_bots: ${{ inputs.allowed_bots }}
    # Second fallback (third credential): when the primary failed, no earlier rung
    # SUCCEEDED (a skipped/failed first fallback both read `!= 'success'`), and a
    # second backup token is configured.
    - name: Claude (second fallback credential)
      id: fallback2
      if: >-
        steps.primary.outcome == 'failure' &&
        steps.fallback.outcome != 'success' &&
        inputs.fallback_oauth_token_2 != ''
      continue-on-error: true
      # This wrapper pins no model; every caller supplies --model in claude_args.
      uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1.0.157 allow-default-model
      with:
        claude_code_oauth_token: ${{ inputs.fallback_oauth_token_2 }}
        github_token: ${{ inputs.github_token }}
        prompt: ${{ inputs.prompt }}
        claude_args: ${{ inputs.claude_args }}
        allowed_non_write_users: ${{ inputs.allowed_non_write_users }}
        allowed_bots: ${{ inputs.allowed_bots }}
    # Propagate a hard failure only when NO attempt succeeded: the primary failed
    # and no configured fallback rung succeeded (an unconfigured rung is `skipped`,
    # which is also `!= 'success'`). Otherwise the composite exits 0 and the caller
    # inspects execution_file as usual.
    - name: Propagate failover result
      if: >-
        steps.primary.outcome == 'failure' &&
        steps.fallback.outcome != 'success' &&
        steps.fallback2.outcome != 'success'
      shell: bash
      run: |
        echo "::error::claude-run: the primary Claude credential failed and no working fallback was available (set CLAUDE_CODE_OAUTH_TOKEN / CLAUDE_CODE_OAUTH_TOKEN_FALLBACK / CLAUDE_CODE_OAUTH_TOKEN_FALLBACK_2)." >&2
        exit 1
