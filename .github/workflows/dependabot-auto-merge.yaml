name: Dependabot Auto-Merge

# Automatically merges Dependabot PRs for minor/patch updates after CI passes.
# Major version updates require manual review.

on:
  pull_request:
    types:
      - opened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# Requirements for this workflow to actually merge:
#   1. Repo setting "Allow auto-merge" (Settings → General → Pull Requests) must
#      be ON — otherwise `gh pr merge --auto` has nothing to enable and errors.
#   2. Branch protection with at least one required status check must be ON, or
#      there is no "pending" state for auto-merge to wait on and the PR merges
#      immediately (or the command fails). Auto-merge only fires once required
#      checks pass.
# Note on the token: workflows triggered by Dependabot receive a read-only
# GITHUB_TOKEN by default. The explicit `permissions:` block below overrides that
# default and restores the write scopes (contents + pull-requests) this job needs
# — without it, both the merge and the comment step would 403.
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for minor/patch updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "This is a **major version update** and requires manual review before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
