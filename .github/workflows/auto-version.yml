name: Auto Version Bump and Publish

on:
  push:
    branches: [main, master]

concurrency:
  group: version-and-publish
  cancel-in-progress: false

jobs:
  version-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          # version-bump.sh pushes the vX.Y.Z tag; main is protected by a
          # required-status-checks ruleset the default GITHUB_TOKEN cannot bypass.
          # TEMPLATE_SYNC_TOKEN_ORG is the org PAT registered as a ruleset bypass
          # actor; falls back to GITHUB_TOKEN only when unset (a fork).
          token: ${{ secrets.TEMPLATE_SYNC_TOKEN_ORG || secrets.GITHUB_TOKEN }}

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org

      # `pnpm publish` runs the prepublishOnly hook (npm test), which drives
      # puppeteer. Use the runner's pre-installed Chrome to skip the
      # puppeteer-managed download — the pinned version periodically
      # disappears from Google's chrome-for-testing CDN.
      - name: Use system Chrome
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome" >> $GITHUB_ENV

      - name: Auto Version Bump and Publish
        run: bash scripts/version-bump.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
