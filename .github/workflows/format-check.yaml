name: Format check

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env

      - name: Check formatting
        if: hashFiles('package.json') != ''
        run: pnpm format --check

      - name: Check tracked symlinks are portable
        run: bash .github/scripts/check-symlinks.sh

  # Stable Required check: runs even when `format` is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports. Each
  # workflow's gate has a distinct name so it can be marked Required without
  # colliding with the others in branch-protection settings.
  format-check-passed: # required-check: true
    if: always()
    needs: [format]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/actions/report-job-result
            .github/scripts
          persist-credentials: false

      - name: Report result
        uses: ./.github/actions/report-job-result
        with:
          run: "true"
          decide-result: "success"
          result: ${{ needs.format.result }}
