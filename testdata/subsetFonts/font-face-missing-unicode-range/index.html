<!doctype html>
<html>
  <head>
    <style>
      /* latin-ext (narrow) */
      @font-face {
        font-family: 'Roboto Slab';
        font-style: normal;
        font-weight: 300;
        src:
          local('Roboto Slab Light'),
          local('RobotoSlab-Light'),
          url(BngRUXZYTXPIvIBgJJSb6u9mxLCIwR2oefDofMY.woff2) format('woff2');
        unicode-range:
          U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF,
          U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      /* catch-all (no unicode-range; defaults to U+0-10FFFF per spec) */
      @font-face {
        font-family: 'Roboto Slab';
        font-style: normal;
        font-weight: 300;
        src:
          local('Roboto Slab Light'),
          local('RobotoSlab-Light'),
          url(BngRUXZYTXPIvIBgJJSb6u9mxLCGwR2oefDo.woff2) format('woff2');
      }
      * {
        font-family: Roboto Slab;
      }
    </style>
  </head>

  </body>
